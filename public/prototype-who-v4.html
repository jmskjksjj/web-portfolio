<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeonJ — who?</title>
<style>
  :root {
    --bg: #0a0a0a;
    --stroke: #d4d4d4;
    --stroke-dim: #3a3a3a;
    --accent: #e5e5e5;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafafa;
      --stroke: #1a1a1a;
      --stroke-dim: #c0c0c0;
      --accent: #171717;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: auto; }
  body {
    background: var(--bg);
    overflow-x: hidden;
    cursor: default;
  }
  .spacer { height: 16000px; position: relative; }
  .canvas {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .canvas svg {
    width: 100%;
    height: 100%;
  }
  .hint {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font: 500 10px/1 'SF Mono', 'Cascadia Code', monospace;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--stroke-dim);
    z-index: 10;
    transition: opacity 1s;
    pointer-events: none;
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
<div class="canvas">
<svg id="scene" viewBox="0 0 600 300" preserveAspectRatio="xMidYMid meet" aria-label="One-line journey illustration">

  <!-- Subtle water in pool -->

  <!-- Tiny wave marks in the sea -->
  <g opacity="0.12" stroke="var(--stroke)" stroke-width="0.5" fill="none" stroke-linecap="round">

    <path d="M 530,208 C 537,205 545,209 553,206"/>

    <path d="M 565,220 C 572,217 580,221 588,218"/>
  </g>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- TINY CHARACTER (proportional to the landscape)                -->
  <!-- ══════════════════════════════════════════════════════════════ -->

  <g id="person" opacity="0.9">
    <!-- head -->
    <circle id="pHead" cx="0" cy="-7.5" r="1.8"
      fill="none" stroke="var(--stroke)" stroke-width="0.9"/>
    <!-- body -->
    <line id="pBody" x1="0" y1="-5.7" x2="0" y2="0"
      stroke="var(--stroke)" stroke-width="0.9" stroke-linecap="round"/>
    <!-- left leg -->
    <line id="pLL" x1="0" y1="0" x2="-1.8" y2="3.5"
      stroke="var(--stroke)" stroke-width="0.9" stroke-linecap="round"/>
    <!-- right leg -->
    <line id="pRL" x1="0" y1="0" x2="1.8" y2="3.5"
      stroke="var(--stroke)" stroke-width="0.9" stroke-linecap="round"/>
    <!-- left arm -->
    <line id="pLA" x1="0" y1="-3.8" x2="-2.5" y2="-1"
      stroke="var(--stroke)" stroke-width="0.9" stroke-linecap="round"/>
    <!-- right arm -->
    <line id="pRA" x1="0" y1="-3.8" x2="2.5" y2="-1"
      stroke="var(--stroke)" stroke-width="0.9" stroke-linecap="round"/>
  </g>

  <!-- Fish (hidden until caught) -->
  <g id="theFish" opacity="0">
    <path d="M 0,0 C 1.5,-1.2 4,-1.5 6,0 C 4,1.5 1.5,1.2 0,0 Z
             M 6,0 L 8,-1.8 L 8,1.8 Z
             M 2.2,-0.3 C 2.5,-0.3 2.5,0.3 2.2,0.3"
      fill="none" stroke="var(--stroke)" stroke-width="0.6" stroke-linecap="round" opacity="0.7"/>
  </g>

</svg>
</div>

<div class="spacer"></div>
<div class="hint" id="hint">scroll</div>

<script>
(function(){
'use strict';

const $ = id => document.getElementById(id);
const path    = $('journey');
const svg     = $('scene');
const person  = $('person');
const pLL     = $('pLL');
const pRL     = $('pRL');
const pLA     = $('pLA');
const pRA     = $('pRA');
const pBody   = $('pBody');
const pHead   = $('pHead');
const hint    = $('hint');
const theFish = $('theFish');

const LEN = path.getTotalLength();

// Zones by scroll progress [start, end]
const ZONE = {
  approach:  [0.00, 0.15],   // walking to track
  track:     [0.15, 0.35],   // running around the track
  toPool:    [0.35, 0.42],   // walking to pool
  pool:      [0.42, 0.60],   // dive + swim
  toSea:     [0.60, 0.72],   // walking to sea
  fishing:   [0.72, 1.00],   // sit, fish, catch
};

function inZ(p, z) { return p >= z[0] && p < z[1]; }
function zT(p, z)  { return Math.max(0, Math.min(1, (p - z[0]) / (z[1] - z[0]))); }

// Pose helpers
function walk(t, spd) {
  const s = Math.sin(t * spd);
  const c = Math.cos(t * spd);
  pLL.setAttribute('x2', (-1.8 + s * 2.5).toFixed(2));
  pLL.setAttribute('y2', (3.5 - Math.abs(s) * 0.8).toFixed(2));
  pRL.setAttribute('x2', (1.8 - s * 2.5).toFixed(2));
  pRL.setAttribute('y2', (3.5 - Math.abs(c) * 0.6).toFixed(2));
  pLA.setAttribute('x2', (-2.5 - s * 1.5).toFixed(2));
  pLA.setAttribute('y2', (-1 + s * 0.8).toFixed(2));
  pRA.setAttribute('x2', (2.5 + s * 1.5).toFixed(2));
  pRA.setAttribute('y2', (-1 - s * 0.8).toFixed(2));
}

function run(t) {
  const s = Math.sin(t * 20);
  const c = Math.cos(t * 20);
  pLL.setAttribute('x2', (-1 + s * 3.5).toFixed(2));
  pLL.setAttribute('y2', (3 - Math.abs(s) * 1.2).toFixed(2));
  pRL.setAttribute('x2', (1 - s * 3.5).toFixed(2));
  pRL.setAttribute('y2', (3 - Math.abs(c) * 1).toFixed(2));
  pLA.setAttribute('x2', (-3 - s * 2.2).toFixed(2));
  pLA.setAttribute('y2', (-2.5 + s * 1.2).toFixed(2));
  pRA.setAttribute('x2', (3 + s * 2.2).toFixed(2));
  pRA.setAttribute('y2', (-2.5 - s * 1.2).toFixed(2));
}

function swim(t) {
  const s = Math.sin(t * 8);
  pLL.setAttribute('x2', (-1.5 + s * 2).toFixed(2));
  pLL.setAttribute('y2', '3');
  pRL.setAttribute('x2', (1.5 - s * 2).toFixed(2));
  pRL.setAttribute('y2', '3');
  pLA.setAttribute('x2', (-3 + s * 4).toFixed(2));
  pLA.setAttribute('y2', (-2 + Math.abs(s) * 1.5).toFixed(2));
  pRA.setAttribute('x2', (3 - s * 4).toFixed(2));
  pRA.setAttribute('y2', (-2 + Math.abs(s) * 1.5).toFixed(2));
}

function sit() {
  pBody.setAttribute('x2', '0.8');
  pBody.setAttribute('y2', '0.5');
  pLL.setAttribute('x2', '-2.5');
  pLL.setAttribute('y2', '2.5');
  pRL.setAttribute('x2', '3');
  pRL.setAttribute('y2', '1.5');
  pLA.setAttribute('x2', '-1.8');
  pLA.setAttribute('y2', '-1.5');
  pRA.setAttribute('x2', '3.5');
  pRA.setAttribute('y2', '-4');
}

function stand() {
  pBody.setAttribute('x2', '0');
  pBody.setAttribute('y2', '0');
  pLL.setAttribute('x2', '-1.8');
  pLL.setAttribute('y2', '3.5');
  pRL.setAttribute('x2', '1.8');
  pRL.setAttribute('y2', '3.5');
  pLA.setAttribute('x2', '-2.5');
  pLA.setAttribute('y2', '-1');
  pRA.setAttribute('x2', '2.5');
  pRA.setAttribute('y2', '-1');
}

function diveUp() {
  pLL.setAttribute('x2', '-0.5');
  pLL.setAttribute('y2', '3.5');
  pRL.setAttribute('x2', '0.5');
  pRL.setAttribute('y2', '3.5');
  pLA.setAttribute('x2', '-1');
  pLA.setAttribute('y2', '-6');
  pRA.setAttribute('x2', '1');
  pRA.setAttribute('y2', '-6');
}

// State
let smooth = 0;
let time = 0;
let prev = 0;
let fishCaught = false;
let fishTime = 0;

function frame(ts) {
  const dt = prev ? (ts - prev) / 1000 : 0.016;
  prev = ts;
  time += dt;

  const maxScroll = document.body.scrollHeight - window.innerHeight;
  const raw = maxScroll > 0 ? window.scrollY / maxScroll : 0;
  smooth += (raw - smooth) * 0.06;

  // Hint
  hint.style.opacity = smooth > 0.01 ? '0' : '0.6';

  // Position on path
  const dist = smooth * LEN;
  const pt = path.getPointAtLength(Math.min(dist, LEN - 1));

  let cx = pt.x;
  let cy = pt.y;
  let op = 0.9;

  // Reset body line
  pBody.setAttribute('x1', '0');
  pBody.setAttribute('y1', '-5.7');
  pBody.setAttribute('x2', '0');
  pBody.setAttribute('y2', '0');

  // Zone behavior
  if (inZ(smooth, ZONE.approach)) {
    walk(time, 10);
  }
  else if (inZ(smooth, ZONE.track)) {
    run(time);
  }
  else if (inZ(smooth, ZONE.toPool)) {
    walk(time, 10);
  }
  else if (inZ(smooth, ZONE.pool)) {
    const t = zT(smooth, ZONE.pool);
    if (t < 0.12) {
      walk(time, 8);
    } else if (t < 0.25) {
      // On edge, preparing
      stand();
      pLA.setAttribute('x2', '-1');
      pLA.setAttribute('y2', '-6');
      pRA.setAttribute('x2', '1');
      pRA.setAttribute('y2', '-6');
    } else if (t < 0.38) {
      // Diving arc
      const d = (t - 0.25) / 0.13;
      cx = 278 + d * 6;
      cy = 124 - Math.sin(d * Math.PI) * 22 + d * 18;
      diveUp();
      op = 0.85;
    } else if (t < 0.48) {
      // Underwater
      const u = (t - 0.38) / 0.10;
      cx = 275 + u * 4;
      cy = 148 + u * 8;
      op = 0.4;
      swim(time);
    } else {
      // Swimming across
      const sw = (t - 0.48) / 0.52;
      cx = 260 + sw * 30;
      cy = 160;
      op = 0.5;
      swim(time);
    }
  }
  else if (inZ(smooth, ZONE.toSea)) {
    op = 0.9;
    walk(time, 10);
  }
  else if (inZ(smooth, ZONE.fishing)) {
    const t = zT(smooth, ZONE.fishing);
    op = 0.9;
    if (t < 0.12) {
      walk(time, 7);
    } else {
      sit();
      // Fish catch
      if (t > 0.55) {
        if (!fishCaught) { fishCaught = true; fishTime = 0; }
        fishTime += dt;
        const cp = Math.min(1, fishTime * 0.35);
        const fy = 224 - cp * 35;
        theFish.setAttribute('opacity', String(Math.min(0.7, cp * 1.8)));
        theFish.setAttribute('transform',
          `translate(${(668 - cp * 4).toFixed(1)}, ${fy.toFixed(1)}) scale(${(0.6 + cp * 0.4).toFixed(2)})`);
      }
    }
  }

  // Reset fish when not fishing
  if (!inZ(smooth, ZONE.fishing)) {
    theFish.setAttribute('opacity', '0');
    fishCaught = false;
    fishTime = 0;
  }

  // Character position
  person.setAttribute('transform', `translate(${cx.toFixed(1)}, ${cy.toFixed(1)})`);
  person.setAttribute('opacity', String(op));

  // Camera — smooth follow with breathing room
  const vw = 200;
  const vh = 120;
  const tx = cx - vw * 0.38;
  const ty = cy - vh * 0.55;
  const camX = Math.max(-40, Math.min(tx, 550));
  const camY = Math.max(70, Math.min(ty, 160));
  svg.setAttribute('viewBox',
    `${camX.toFixed(1)} ${camY.toFixed(1)} ${vw} ${vh}`);

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
})();
</script>
</body>
</html>

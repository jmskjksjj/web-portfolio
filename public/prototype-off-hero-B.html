<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Off Hero — B: O as Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e5e5e5;
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    pointer-events: none;
    z-index: 999;
  }

  .nav-mock {
    height: 56px;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    padding: 0 clamp(32px, 6vw, 80px);
    font-size: 13px;
    color: #666;
    letter-spacing: 0.06em;
  }

  .nav-mock span { color: #e5e5e5; }

  .hero {
    height: calc(100vh - 56px);
    position: relative;
    overflow: hidden;
  }

  /* O bleeds LEFT, off screen by ~40% */
  .big-o {
    position: absolute;
    top: 50%;
    left: -38vw;
    transform: translateY(-50%);
    width: 90vw;
    height: 90vw;
    max-width: 1200px;
    max-height: 1200px;
    border: 1px solid #2a2a2a;
    border-radius: 50%;
    z-index: 1;
  }

  .big-o::before {
    content: '';
    position: absolute;
    inset: 12%;
    border: 1px solid #1a1a1a;
    border-radius: 50%;
  }

  /* Second inner concentric */
  .big-o::after {
    content: '';
    position: absolute;
    inset: 28%;
    border: 1px solid #151515;
    border-radius: 50%;
  }

  /* ff text aligned right of O */
  .title-ff {
    position: absolute;
    top: 50%;
    left: 44vw;
    transform: translateY(-50%);
    font-size: clamp(280px, 40vw, 620px);
    font-weight: 200;
    letter-spacing: -0.06em;
    color: #fff;
    line-height: 0.82;
    z-index: 2;
  }

  /* Small "Hours" */
  .subtitle {
    position: absolute;
    top: calc(50% + 80px);
    left: 44vw;
    transform: translateY(0);
    font-size: 14px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #666;
    font-family: 'Courier New', monospace;
    z-index: 3;
    margin-top: clamp(180px, 24vw, 340px);
  }

  /* Top-left label */
  .hero-label {
    position: absolute;
    top: 40px;
    left: clamp(32px, 6vw, 80px);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #555;
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: 'Courier New', monospace;
    z-index: 10;
  }

  .hero-label::before {
    content: '';
    width: 40px;
    height: 1px;
    background: #333;
  }

  /* Top-right meta */
  .hero-meta {
    position: absolute;
    top: 40px;
    right: clamp(32px, 6vw, 80px);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #444;
    font-family: 'Courier New', monospace;
    z-index: 10;
    text-align: right;
  }

  .hero-meta-sub {
    margin-top: 8px;
    color: #333;
    letter-spacing: 0.06em;
    text-transform: none;
  }

  /* Bottom description */
  .hero-desc {
    position: absolute;
    bottom: 80px;
    right: clamp(32px, 6vw, 80px);
    max-width: 360px;
    font-size: 14px;
    color: #888;
    font-weight: 300;
    line-height: 1.7;
    text-align: right;
    z-index: 10;
  }

  /* Bottom line */
  .hero-line {
    position: absolute;
    bottom: 40px;
    left: 0;
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #1e1e1e 10%, #1e1e1e 90%, transparent);
  }

  /* Crosshair in O center */
  .crosshair {
    position: absolute;
    top: 50%;
    left: -38vw;
    width: 90vw;
    height: 90vw;
    max-width: 1200px;
    max-height: 1200px;
    transform: translateY(-50%);
    pointer-events: none;
    z-index: 2;
  }

  .crosshair::before,
  .crosshair::after {
    content: '';
    position: absolute;
    background: #2a2a2a;
  }

  .crosshair::before {
    top: 50%;
    left: 10%;
    right: 10%;
    height: 1px;
  }

  .crosshair::after {
    left: 50%;
    top: 10%;
    bottom: 10%;
    width: 1px;
  }

  @media (max-width: 768px) {
    .big-o {
      left: -60vw;
      width: 120vw;
      height: 120vw;
    }
    .crosshair {
      left: -60vw;
      width: 120vw;
      height: 120vw;
    }
    .title-ff {
      left: auto;
      right: 32px;
      font-size: 45vw;
    }
    .subtitle { left: auto; right: 32px; }
    .hero-desc { font-size: 12px; max-width: 240px; }
  }
</style>
</head>
<body>
  <div class="nav-mock"><span>SeonJ</span> &nbsp;—&nbsp; on &nbsp;—&nbsp; off</div>

  <section class="hero">
    <div class="hero-label">CONCEPT B &nbsp;/&nbsp; O as Portal</div>

    <div class="hero-meta">
      — 010 / INTERESTS
      <div class="hero-meta-sub">When the code stops, life begins</div>
    </div>

    <div class="big-o"></div>
    <div class="crosshair"></div>
    <div class="title-ff">ff</div>
    <div class="subtitle">— Off Hours / 취미</div>

    <div class="hero-desc">
      The things that keep me balanced.<br>
      Some require endurance, some patience,<br>
      some company.
    </div>

    <div class="hero-line"></div>
  </section>
</body>
</html>
